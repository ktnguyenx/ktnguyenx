<svg width="960" height="356" viewBox="0 0 960 356" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated iMessage-style README conversation for Lorraine Nguyen</title>
  <desc id="desc">A minimal conversation with a typing indicator and three iMessage-inspired bubbles that animate in from alternating sides.</desc>
  <style>
    text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 22px;
      font-weight: 500;
    }

    .dark {
      fill: #111111;
    }

    .light {
      fill: #ffffff;
    }

    .status {
      fill: #7d7d82;
      font-size: 16px;
      font-weight: 500;
    }

    .typing,
    .bubble {
      opacity: 0;
    }

    .left {
      transform: translateX(-24px);
      transform-box: fill-box;
      transform-origin: left center;
    }

    .right {
      transform: translateX(24px);
      transform-box: fill-box;
      transform-origin: right center;
    }

    #typing {
      animation: typing-cycle 12s infinite;
    }

    #typing-dot-1 {
      animation: dot-blink 1s infinite 0.1s;
    }

    #typing-dot-2 {
      animation: dot-blink 1s infinite 0.28s;
    }

    #typing-dot-3 {
      animation: dot-blink 1s infinite 0.46s;
    }

    #bubble-1 {
      animation: left-bubble-1 12s infinite;
    }

    #bubble-2 {
      animation: right-bubble-2 12s infinite;
    }

    #bubble-3 {
      animation: left-bubble-3 12s infinite;
    }

    @keyframes typing-cycle {
      0%, 5% {
        opacity: 0;
        transform: translateX(-18px);
      }

      8%, 18% {
        opacity: 1;
        transform: translateX(0);
      }

      22%, 100% {
        opacity: 0;
        transform: translateX(-10px);
      }
    }

    @keyframes left-bubble-1 {
      0%, 18% {
        opacity: 0;
        transform: translateX(-24px);
      }

      24%, 90% {
        opacity: 1;
        transform: translateX(0);
      }

      100% {
        opacity: 0;
        transform: translateX(-12px);
      }
    }

    @keyframes right-bubble-2 {
      0%, 34% {
        opacity: 0;
        transform: translateX(24px);
      }

      40%, 90% {
        opacity: 1;
        transform: translateX(0);
      }

      100% {
        opacity: 0;
        transform: translateX(12px);
      }
    }

    @keyframes left-bubble-3 {
      0%, 50% {
        opacity: 0;
        transform: translateX(-24px);
      }

      56%, 90% {
        opacity: 1;
        transform: translateX(0);
      }

      100% {
        opacity: 0;
        transform: translateX(-12px);
      }
    }

    @keyframes dot-blink {
      0%, 80%, 100% {
        opacity: 0.25;
      }

      40% {
        opacity: 1;
      }
    }
  </style>

  <defs>
    <symbol id="message-tail" viewBox="0 0 21 28">
      <path d="M21.006,27.636C21.02,27.651 11.155,30.269 1.302,21.384C0.051,20.256 0.065,15.626 0.006,14.004C-0.253,6.917 8.514,-0.156 11.953,0.003L11.953,13.18C11.953,17.992 12.717,23.841 21.006,27.636Z"/>
    </symbol>
  </defs>

  <g id="typing" class="typing left">
    <rect x="88" y="34" width="92" height="42" rx="21" fill="#E9E9EB"/>
    <circle id="typing-dot-1" cx="117" cy="55" r="4.5" fill="#7D7D82"/>
    <circle id="typing-dot-2" cx="134" cy="55" r="4.5" fill="#7D7D82"/>
    <circle id="typing-dot-3" cx="151" cy="55" r="4.5" fill="#7D7D82"/>
  </g>

  <g id="bubble-1" class="bubble left">
    <rect x="88" y="34" width="204" height="50" rx="25" fill="#E9E9EB"/>
    <text x="114" y="66" class="dark">Hi, I'm Lorraine.</text>
  </g>

  <g id="bubble-2" class="bubble right">
    <rect x="582" y="122" width="306" height="50" rx="25" fill="#509DF6"/>
    <text x="606" y="154" class="light">CS Undegrad @ Haverford</text>
    <text x="864" y="194" text-anchor="end" class="status">Delivered</text>
  </g>

  <g id="bubble-3" class="bubble left">
    <rect x="88" y="280" width="679" height="50" rx="25" fill="#E9E9EB"/>
    <text x="114" y="312" class="dark">I love creative programming and designing thoughtful interfaces.</text>
  </g>
</svg>
