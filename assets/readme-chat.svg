<svg width="960" height="300" viewBox="0 0 960 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated iMessage-style README conversation for Khanh Nguyen</title>
  <desc id="desc">A minimal conversation with a typing indicator and three iMessage-inspired bubbles that animate in from alternating sides.</desc>
  <style>
    text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 22px;
      font-weight: 500;
    }

    .dark {
      fill: #111111;
    }

    .light {
      fill: #ffffff;
    }

    .typing,
    .bubble {
      opacity: 0;
    }

    .left {
      transform: translateX(-24px);
      transform-box: fill-box;
      transform-origin: left center;
    }

    .right {
      transform: translateX(24px);
      transform-box: fill-box;
      transform-origin: right center;
    }

    #typing {
      animation: typing-cycle 12s infinite;
    }

    #typing-dot-1 {
      animation: dot-blink 1s infinite 0.1s;
    }

    #typing-dot-2 {
      animation: dot-blink 1s infinite 0.28s;
    }

    #typing-dot-3 {
      animation: dot-blink 1s infinite 0.46s;
    }

    #bubble-1 {
      animation: left-bubble-1 12s infinite;
    }

    #bubble-2 {
      animation: right-bubble-2 12s infinite;
    }

    #bubble-3 {
      animation: left-bubble-3 12s infinite;
    }

    @keyframes typing-cycle {
      0%, 5% {
        opacity: 0;
        transform: translateX(-18px);
      }

      8%, 18% {
        opacity: 1;
        transform: translateX(0);
      }

      22%, 100% {
        opacity: 0;
        transform: translateX(-10px);
      }
    }

    @keyframes left-bubble-1 {
      0%, 18% {
        opacity: 0;
        transform: translateX(-24px);
      }

      24%, 90% {
        opacity: 1;
        transform: translateX(0);
      }

      100% {
        opacity: 0;
        transform: translateX(-12px);
      }
    }

    @keyframes right-bubble-2 {
      0%, 34% {
        opacity: 0;
        transform: translateX(24px);
      }

      40%, 90% {
        opacity: 1;
        transform: translateX(0);
      }

      100% {
        opacity: 0;
        transform: translateX(12px);
      }
    }

    @keyframes left-bubble-3 {
      0%, 50% {
        opacity: 0;
        transform: translateX(-24px);
      }

      56%, 90% {
        opacity: 1;
        transform: translateX(0);
      }

      100% {
        opacity: 0;
        transform: translateX(-12px);
      }
    }

    @keyframes dot-blink {
      0%, 80%, 100% {
        opacity: 0.25;
      }

      40% {
        opacity: 1;
      }
    }
  </style>

  <g id="typing" class="typing left">
    <rect x="88" y="34" width="92" height="42" rx="21" fill="#E9E9EB"/>
    <circle id="typing-dot-1" cx="117" cy="55" r="4.5" fill="#7D7D82"/>
    <circle id="typing-dot-2" cx="134" cy="55" r="4.5" fill="#7D7D82"/>
    <circle id="typing-dot-3" cx="151" cy="55" r="4.5" fill="#7D7D82"/>
  </g>

  <g id="bubble-1" class="bubble left">
    <rect x="88" y="34" width="220" height="54" rx="27" fill="#E9E9EB"/>
    <text x="114" y="68" class="dark">Hi, I'm Khanh.</text>
  </g>

  <g id="bubble-2" class="bubble right">
    <rect x="492" y="106" width="380" height="84" rx="30" fill="#0A84FF"/>
    <text x="520" y="141" class="light">
      <tspan x="520" dy="0">CS student at Haverford College,</tspan>
      <tspan x="520" dy="28">originally from Vietnam.</tspan>
    </text>
  </g>

  <g id="bubble-3" class="bubble left">
    <rect x="88" y="208" width="586" height="84" rx="30" fill="#E9E9EB"/>
    <text x="114" y="243" class="dark">
      <tspan x="114" dy="0">I love creative programming and</tspan>
      <tspan x="114" dy="28">designing thoughtful interfaces.</tspan>
    </text>
  </g>
</svg>
