<svg width="960" height="320" viewBox="0 0 960 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated README chat bubbles for Khanh Nguyen</title>
  <desc id="desc">A minimal animated chat scene with a typing indicator and colorful message bubbles.</desc>
  <style>
    text {
      font-family: "Segoe UI", Arial, sans-serif;
      fill: #18212f;
    }

    .bubble-text {
      font-size: 20px;
      font-weight: 600;
    }

    .bubble {
      opacity: 0;
      transform: translateY(16px) scale(0.985);
      transform-box: fill-box;
      transform-origin: left center;
    }

    #typing {
      opacity: 0;
      animation: typing-cycle 12s infinite;
    }

    #dot-1 {
      animation: dot-blink 1s infinite 0.1s;
    }

    #dot-2 {
      animation: dot-blink 1s infinite 0.3s;
    }

    #dot-3 {
      animation: dot-blink 1s infinite 0.5s;
    }

    #bubble-1 {
      animation: bubble-1-cycle 12s infinite;
    }

    #bubble-2 {
      animation: bubble-2-cycle 12s infinite;
    }

    #bubble-3 {
      animation: bubble-3-cycle 12s infinite;
    }

    @keyframes typing-cycle {
      0%, 4% {
        opacity: 0;
      }

      8%, 18% {
        opacity: 1;
      }

      22%, 100% {
        opacity: 0;
      }
    }

    @keyframes dot-blink {
      0%, 80%, 100% {
        opacity: 0.24;
      }

      40% {
        opacity: 1;
      }
    }

    @keyframes bubble-1-cycle {
      0%, 18% {
        opacity: 0;
        transform: translateY(16px) scale(0.985);
      }

      24%, 88% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      100% {
        opacity: 0;
        transform: translateY(10px) scale(0.99);
      }
    }

    @keyframes bubble-2-cycle {
      0%, 33% {
        opacity: 0;
        transform: translateY(16px) scale(0.985);
      }

      39%, 88% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      100% {
        opacity: 0;
        transform: translateY(10px) scale(0.99);
      }
    }

    @keyframes bubble-3-cycle {
      0%, 49% {
        opacity: 0;
        transform: translateY(16px) scale(0.985);
      }

      56%, 88% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      100% {
        opacity: 0;
        transform: translateY(10px) scale(0.99);
      }
    }
  </style>

  <defs>
    <linearGradient id="bg" x1="98" y1="24" x2="867" y2="291" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fbff"/>
      <stop offset="0.52" stop-color="#f6f4ff"/>
      <stop offset="1" stop-color="#fff8f2"/>
    </linearGradient>
    <linearGradient id="blob-a" x1="158" y1="31" x2="309" y2="121" gradientUnits="userSpaceOnUse">
      <stop stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="blob-b" x1="675" y1="210" x2="841" y2="286" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fde68a"/>
      <stop offset="1" stop-color="#fdba74"/>
    </linearGradient>
    <filter id="shadow" x="48" y="8" width="864" height="304" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#8da2c0" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="960" height="320" rx="30" fill="transparent"/>
  <circle cx="206" cy="70" r="58" fill="url(#blob-a)" opacity="0.65"/>
  <circle cx="778" cy="254" r="62" fill="url(#blob-b)" opacity="0.38"/>

  <g filter="url(#shadow)">
    <rect x="72" y="28" width="816" height="264" rx="34" fill="url(#bg)"/>

    <g id="typing">
      <rect x="116" y="72" width="96" height="46" rx="23" fill="#e9eef7"/>
      <circle id="dot-1" cx="148" cy="95" r="4.6" fill="#667085"/>
      <circle id="dot-2" cx="164" cy="95" r="4.6" fill="#667085"/>
      <circle id="dot-3" cx="180" cy="95" r="4.6" fill="#667085"/>
    </g>

    <g id="bubble-1" class="bubble">
      <rect x="116" y="72" width="222" height="54" rx="27" fill="#dbeafe"/>
      <text x="142" y="106" class="bubble-text">Hi, I'm Khanh.</text>
    </g>

    <g id="bubble-2" class="bubble">
      <rect x="116" y="142" width="516" height="88" rx="30" fill="#ddd6fe"/>
      <text x="142" y="178" class="bubble-text">
        <tspan x="142" dy="0">CS student at Haverford College,</tspan>
        <tspan x="142" dy="28">originally from Vietnam.</tspan>
      </text>
    </g>

    <g id="bubble-3" class="bubble">
      <rect x="116" y="246" width="540" height="46" rx="23" fill="#fed7aa"/>
      <text x="142" y="276" class="bubble-text">I love creative programming and designing thoughtful interfaces.</text>
    </g>
  </g>
</svg>
