<svg width="960" height="320" viewBox="0 0 960 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated iMessage-style README conversation for Lorraine Nguyen</title>
  <desc id="desc">A minimal conversation with a typing indicator and three iMessage-inspired bubbles that animate in from alternating sides.</desc>
  <style>
    text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 22px;
      font-weight: 500;
    }

    .dark {
      fill: #111111;
    }

    .light {
      fill: #ffffff;
    }

    .status {
      fill: #7d7d82;
      font-size: 16px;
      font-weight: 500;
    }

    .typing,
    .bubble,
    .status-mark {
      opacity: 0;
    }

    .left {
      transform: translateX(-24px);
      transform-box: fill-box;
      transform-origin: left center;
    }

    .right {
      transform: translateX(24px);
      transform-box: fill-box;
      transform-origin: right center;
    }

    #typing {
      animation: typing-cycle 12s infinite;
    }

    #typing-dot-1 {
      animation: dot-blink 1s infinite 0.1s;
    }

    #typing-dot-2 {
      animation: dot-blink 1s infinite 0.28s;
    }

    #typing-dot-3 {
      animation: dot-blink 1s infinite 0.46s;
    }

    #bubble-1 {
      animation: left-bubble-1 12s infinite;
    }

    #bubble-2 {
      animation: right-bubble-2 12s infinite;
    }

    #bubble-3 {
      animation: left-bubble-3 12s infinite;
    }

    #status-2 {
      animation: status-2-cycle 12s infinite;
    }

    @keyframes typing-cycle {
      0%, 5% {
        opacity: 0;
        transform: translateX(-18px);
      }

      8%, 18% {
        opacity: 1;
        transform: translateX(0);
      }

      22%, 100% {
        opacity: 0;
        transform: translateX(-10px);
      }
    }

    @keyframes left-bubble-1 {
      0%, 18% {
        opacity: 0;
        transform: translateX(-24px);
      }

      24%, 90% {
        opacity: 1;
        transform: translateX(0);
      }

      100% {
        opacity: 0;
        transform: translateX(-12px);
      }
    }

    @keyframes right-bubble-2 {
      0%, 34% {
        opacity: 0;
        transform: translateX(24px);
      }

      40%, 90% {
        opacity: 1;
        transform: translateX(0);
      }

      100% {
        opacity: 0;
        transform: translateX(12px);
      }
    }

    @keyframes left-bubble-3 {
      0%, 58% {
        opacity: 0;
        transform: translateX(-24px);
      }

      64%, 90% {
        opacity: 1;
        transform: translateX(0);
      }

      100% {
        opacity: 0;
        transform: translateX(-12px);
      }
    }

    @keyframes status-2-cycle {
      0%, 46% {
        opacity: 0;
        transform: translateX(10px);
      }

      52%, 90% {
        opacity: 1;
        transform: translateX(0);
      }

      100% {
        opacity: 0;
        transform: translateX(6px);
      }
    }

    @keyframes dot-blink {
      0%, 80%, 100% {
        opacity: 0.25;
      }

      40% {
        opacity: 1;
      }
    }
  </style>

  <defs>
    <symbol id="curl-right" viewBox="0 0 17 21">
      <path d="M16.8869 20.1846C11.6869 20.9846 6.55352 18.1212 4.88685 16.2879C6.60472 12.1914 -4.00107 2.24186 2.99893 2.24148C4.61754 2.24148 6 -1.9986 11.8869 1.1846C11.9081 2.47144 11.8869 6.92582 11.8869 7.6842C11.8869 18.1842 17.8869 19.5813 16.8869 20.1846Z"/>
    </symbol>
    <symbol id="curl-left" viewBox="0 0 17 21">
      <path d="M0.11315 20.1846C5.31315 20.9846 10.4465 18.1212 12.1132 16.2879C10.3953 12.1914 21.0011 2.24186 14.0011 2.24148C12.3825 2.24148 11 -1.9986 5.11315 1.1846C5.09194 2.47144 5.11315 6.92582 5.11315 7.6842C5.11315 18.1842 -0.88685 19.5813 0.11315 20.1846Z"/>
    </symbol>
  </defs>

  <g id="typing" class="typing left">
    <rect x="88" y="34" width="92" height="42" rx="21" fill="#E9E9EB"/>
    <use href="#curl-left" x="85" y="56" width="16" height="17" fill="#E9E9EB"/>
    <circle id="typing-dot-1" cx="117" cy="55" r="4.5" fill="#7D7D82"/>
    <circle id="typing-dot-2" cx="134" cy="55" r="4.5" fill="#7D7D82"/>
    <circle id="typing-dot-3" cx="151" cy="55" r="4.5" fill="#7D7D82"/>
  </g>

  <g id="bubble-1" class="bubble left">
    <rect x="88" y="34" width="205" height="50" rx="25" fill="#E9E9EB"/>
    <use href="#curl-left" x="85" y="64" width="19" height="20" fill="#E9E9EB"/>
    <text x="114" y="66" class="dark">Hi, I'm Lorraine!</text>
  </g>

  <g id="bubble-2" class="bubble right">
    <rect x="582" y="110" width="306" height="50" rx="25" fill="#509DF6"/>
    <use href="#curl-right" x="873" y="140" width="19" height="20" fill="#509DF6"/>
    <text x="606" y="142" class="light">CS Undegrad @ Haverford</text>
  </g>

  <g id="status-2" class="status-mark right">
    <text x="864" y="180" text-anchor="end" class="status">Delivered</text>
  </g>

  <g id="bubble-3" class="bubble left">
    <rect x="88" y="220" width="706" height="50" rx="25" fill="#E9E9EB"/>
    <use href="#curl-left" x="85" y="250" width="19" height="20" fill="#E9E9EB"/>
    <text x="114" y="252" class="dark">I love creative programming and designing thoughtful interfaces &lt;3</text>
  </g>
</svg>
